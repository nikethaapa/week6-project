<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="./dist/output.css" rel="stylesheet">
    <title>Golden Spoon 🍽️</title>
</head>

<body class="relative h-screen bg-gradient-to-r from-[#3e5151] via-[#decba4] to-[#3e5151]">
    <!--NavBar-->
    <div class="shadow-2xl flex justify-between items-center mx-10 mt-10 p-5 rounded-t-2xl bg-white">
        <div class="flex justify-center items-center gap-2">
            <i class="fa-solid fa-bell-concierge fa-xl" style="color: rgb(22, 22, 22);"></i>
            <h1 class="text-2xl font-bold">The Golden Spoon</h1>
        </div>


        <div class="flex gap-10 ">
            <a href="#" class="hover:underline hidden lg:block">Home</a>
            <a href="" class="hover:underline hidden lg:block">Menu</a>
            <a href="./booking.html" class="hover:underline hidden lg:block">Booking</a>
            <a href="" class="hover:underline hidden lg:block">Orders</a>
            <a href="./feedback.html" class="hover:underline hidden lg:block">Feedback</a>

        </div>

        <div id="one" class="lg:hidden">
            <i class="fa-solid fa-bars cursor-pointer" style="color: rgb(22, 22, 22);"></i>
        </div>


    </div>

    <div id="two"
        class="fixed top-0 right-0 bg-black text-white w-1/2 h-screen flex flex-col p-10 gap-10 z-40 transition duration-1000 translate-x-full">
        <i id="three" class="fa-solid fa-xmark absolute right-10 cursor-pointer hover:text-amber-300"
            style="color: white"></i>
        <a href="#" class="hover:underline mt-10">Home</a>
        <a href="" class="hover:underline ">Menu</a>
        <a href="./booking.html" class="hover:underline ">Booking</a>
        <a href="" class="hover:underline ">Orders</a>
        <a href="./feedback.html" class="hover:underline ">Feedback</a>
    </div>

    <!-- heroSection -->
    <div class="relative px-10  h-[50vh] sm:h-[60vh] md:h-[65vh] lg:h-[70vh] w-full overflow-hidden rounded-xl">

        <img src="./img/p1.jpg" class="w-full h-full object-cover">

        <div class="mx-10 absolute inset-0 bg-black/40"></div>

        <div class="absolute inset-0 flex flex-col justify-center items-start px-5 text-white">

            <h1 class="mx-10 text-xl md:text-3xl lg:text-5xl font-bold leading-tight">
                Welcome To Golden Spoon <br> Restaurant
            </h1>

            <p class="mx-10 mt-3 text-sm md:text-lg">
                Delicious Indian, Chinese & Western Food.
            </p>

            <!-- Buttons -->
            <div class="flex gap-10 mx-10 mt-2 md:mt-4 lg:mt-5">
                <a href="./booking.html">
                    <button id="four" class="px-4 py-2 bg-gradient-to-r from-[#1b5c63] to-[#0D3C45] rounded shadow-2xl hover:-translate-y-2 transition duration-500">
                        Book Table
                    </button>
                </a>

                <a href="./booking.html">
                    <button id="five" class="px-4 py-2 bg-gradient-to-r from-[#1b5c63] to-[#0D3C45] rounded shadow-2xl hover:-translate-y-2 transition duration-500">
                        Order Now
                    </button>
                </a>
            </div>

        </div>
    </div>

    <div class="mx-10 p-5 bg-white">
        <h1 class="text-xl font-bold">Popular Dishes</h1>
        <div class="flex mt-3 gap-5 md:gap-7 lg:gap-10 ">
            <p class="border-b-3 border-transparent hover:border-b-amber-500">All</p>
            <p class="border-b-3 border-transparent hover:border-b-amber-500">Indian</p>
            <p class="border-b-3 border-transparent hover:border-b-amber-500">Chinese</p>
            <p class="border-b-3 border-transparent hover:border-b-amber-500">Western</p>
        </div>



    </div>


    <script src="./Js/script.js"></script>
</body>

</html>
